name: V4_wP Daily Scan

on:
  schedule:
    # 미국 장 마감 후 (EDT 17:00 / EST 17:00 = UTC 21:00)
    # DST 여부 관계없이 1회만 실행 — 장 마감(16:00) 후 충분한 여유
    - cron: '0 21 * * 1-5'
  workflow_dispatch:  # 수동 실행 버튼

# GitHub Pages 배포 권한
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run daily scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
          TELEGRAM_WEBAPP_URL: ${{ secrets.TELEGRAM_WEBAPP_URL }}
          CLAUDE_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python v4wp_realtime/scripts/daily_scan.py

      - name: Commit signal history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals_history.json
          git diff --cached --quiet || git commit -m "data: update signal history $(date -u +%Y-%m-%d)"
          git pull --rebase -X theirs origin main || (git rebase --abort && git pull --no-rebase origin main)
          git push

      # ── Mini App 빌드 + 배포 ──
      - name: Build webapp
        working-directory: v4wp_realtime/webapp
        run: |
          npm ci
          npm run build

      - name: Export static data
        run: python v4wp_realtime/scripts/export_static.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: v4wp_realtime/webapp/dist
